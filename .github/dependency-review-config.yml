# Dependency Review Configuration
# This file configures which vulnerabilities to allow in dependency-review-action
# See: https://github.com/actions/dependency-review-action#configuration-options

# Fail on vulnerabilities of this severity or higher
fail-on-severity: moderate

# Allow specific GitHub Security Advisories (GHSAs)
# Add GHSA IDs here to temporarily allow known vulnerabilities
allow-ghsas:
  # Jetty 11.0.26 is the latest version compatible with Dropwizard 4.0.17.
  # Dropwizard 4.x is pinned to Jetty 11; the fixes require Jetty 12 (Dropwizard 5.x).
  # These will be resolved when the project upgrades to Dropwizard 5.
  - GHSA-qh8g-58pp-2wxh # Jetty URI parsing of invalid authority (moderate)
  - GHSA-355h-qmc2-wpwf # Jetty HTTP Request Smuggling via chunked encoding (high)

