name: Run Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  checks: write
  pull-requests: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6

    - name: Set up JDK 21
      uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5
      with:
        java-version: '21'
        distribution: 'temurin'

    - name: Cache Maven dependencies
      uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5
      with:
        path: ~/.m2
        key: ${{ runner.os }}-m2-${{ hashFiles('**/pom.xml') }}
        restore-keys: ${{ runner.os }}-m2

    - name: Run tests with coverage
      run: |
        mvn -B clean test jacoco:report -Dsurefire.printSummary=true
        ls -la target/
        ls -la target/surefire-reports/ || echo "surefire-reports directory not found"
        # Ensure the XML reports exist
        find target/surefire-reports -name "TEST-*.xml" | wc -l

    - name: Generate test report
      id: test-report
      uses: dorny/test-reporter@a43b3a5f7366b97d083190328d2c652e1a8b6aa2 # v3
      if: always()
      continue-on-error: true
      with:
        name: Maven Tests
        path: target/surefire-reports/TEST-*.xml
        reporter: java-junit
        fail-on-error: false

    - name: Troubleshoot test report failure
      if: always() && steps.test-report.outcome != 'success'
      run: |
        echo "Test report generation failed! Troubleshooting..."
        echo "Looking for XML test reports..."
        find target -name "TEST-*.xml" || echo "No TEST-*.xml files found"
        echo "Checking file permissions..."
        ls -la target/surefire-reports/ || echo "Directory not found"

    - name: Upload coverage reports to Codecov
      uses: codecov/codecov-action@fb8b3582c8e4def4969c97caa2f19720cb33a72f # v6
      if: success() || failure()
      with:
        file: target/site/jacoco/jacoco.xml
        flags: unittests
        name: codecov-umbrella
        fail_ci_if_error: false
        token: ${{ secrets.CODECOV_TOKEN }}

    - name: Comment coverage on PR
      uses: madrapps/jacoco-report@e51ce1f46f7f8b5331593f935e59cbaf44b84920 # v1.8.0
      if: github.event_name == 'pull_request'
      with:
        paths: target/site/jacoco/jacoco.xml
        token: ${{ secrets.GITHUB_TOKEN }}
        min-coverage-overall: 70
        min-coverage-changed-files: 70
        title: 📊 Test Coverage Report
        update-comment: true

    - name: Upload test results
      uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7
      if: always()
      with:
        name: test-results
        path: |
          target/surefire-reports/
          target/site/jacoco/
        retention-days: 7
